<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="application-name" content="StreamTV"/>
  <meta name="theme-color" content="#080810"/>
  <title>StreamTV</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --s1: #0f0f1c;
      --s2: #161628;
      --s3: #1e1e35;
      --border: #ffffff0f;
      --border2: #ffffff1a;
      --accent: #ff3d6e;
      --accent2: #ff8c42;
      --text: #f0f0ff;
      --muted: #6060a0;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
      /* Prevent bounce scroll on iOS */
      position: fixed;
    }

    /* ── APP SHELL — true fullscreen on mobile ── */
    .app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      height: 100dvh;
      /* iOS safe areas */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── HEADER ── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }

    .logo { display: flex; align-items: center; gap: 9px; }
    .logo-mark { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
    .logo-mark svg { width: 14px; height: 14px; fill: #fff; }
    .logo-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; letter-spacing: -0.02em; background: linear-gradient(90deg, var(--text), var(--muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-right { margin-left: auto; display: flex; gap: 8px; }
    .icon-btn { width: 32px; height: 32px; background: var(--s2); border: 1px solid var(--border2); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); }
    .icon-btn svg { width: 15px; height: 15px; fill: currentColor; }

    /* ── MAIN — takes all remaining space ── */
    main {
      flex: 1;
      min-height: 0; /* crucial for flex children to scroll */
      position: relative;
    }

    /* ── VIEWS — absolutely fill main ── */
    .view {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }
    .view.active { display: flex; }

    /* ══════════════════════════════
       PLAYER VIEW
    ══════════════════════════════ */
    #view-player { background: #000; }

    .video-wrap {
      flex-shrink: 0;
      width: 100%;
      background: #000;
      position: relative;
    }

    video {
      display: block;
      width: 100%;
      /* 16:9 aspect ratio */
      aspect-ratio: 16 / 9;
      object-fit: contain;
      background: #000;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollable area below video */
    .player-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--bg);
    }

    .player-info {
      padding: 14px 16px 8px;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
    }
    .now-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 3px; }
    .now-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; }
    .live-row { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
    .live-pill { display: flex; align-items: center; gap: 5px; background: var(--accent)22; border: 1px solid var(--accent)44; border-radius: 20px; padding: 3px 9px; font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; }
    .live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .player-btns { display: flex; gap: 8px; padding: 10px 16px; background: var(--s1); }
    .p-btn { flex: 1; background: var(--s2); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 4px; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
    .p-btn svg { width: 16px; height: 16px; fill: currentColor; }
    .p-btn:active { background: var(--s3); color: var(--text); }

    .error-box { margin: 14px 16px; background: rgba(255,61,110,0.08); border: 1px solid var(--accent)33; border-radius: 10px; padding: 12px 14px; font-size: 12px; color: var(--accent); line-height: 1.6; display: none; }

    .empty-player { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 32px; text-align: center; gap: 10px; }
    .empty-icon { width: 60px; height: 60px; border-radius: 18px; background: var(--s2); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
    .empty-icon svg { width: 26px; height: 26px; fill: var(--muted); }
    .empty-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
    .empty-sub { font-size: 11px; color: var(--muted); line-height: 1.6; max-width: 220px; }

    /* ══════════════════════════════
       CHANNELS VIEW
    ══════════════════════════════ */
    #view-channels { background: var(--bg); }

    .ch-sticky {
      flex-shrink: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .ch-toolbar { display: flex; align-items: center; gap: 10px; padding: 12px 14px 8px; }
    .search-wrap { flex: 1; position: relative; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; fill: var(--muted); pointer-events: none; }
    .search-box { width: 100%; background: var(--s1); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 12px 10px 32px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; outline: none; -webkit-appearance: none; }
    .search-box::placeholder { color: var(--muted); }
    .search-box:focus { border-color: var(--accent)66; }
    .ch-count { background: var(--s2); border-radius: 10px; padding: 3px 9px; font-size: 11px; color: var(--muted); flex-shrink: 0; }

    .group-tabs { display: flex; gap: 6px; padding: 0 14px 10px; overflow-x: auto; scrollbar-width: none; }
    .group-tabs::-webkit-scrollbar { display: none; }
    .gtab { flex-shrink: 0; background: var(--s1); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 11px; color: var(--muted); cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; transition: all 0.15s; }
    .gtab.active { background: var(--accent)20; border-color: var(--accent)60; color: var(--accent); }

    .channel-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 12px 10px; }

    .channel-card { display: flex; align-items: center; gap: 10px; background: var(--s1); border: 1px solid var(--border); border-radius: 10px; padding: 11px 12px; margin-bottom: 7px; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent; }
    .channel-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: linear-gradient(180deg, var(--accent), var(--accent2)); border-radius: 3px 0 0 3px; opacity: 0; transition: opacity 0.15s; }
    .channel-card.playing::before { opacity: 1; }
    .channel-card.playing { background: var(--s2); border-color: var(--border2); }
    .channel-card:active { transform: scale(0.98); }

    .ch-logo { width: 40px; height: 40px; border-radius: 8px; object-fit: contain; background: var(--s2); flex-shrink: 0; border: 1px solid var(--border2); }
    .ch-logo-fb { width: 40px; height: 40px; border-radius: 8px; background: var(--s3); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .ch-info { flex: 1; min-width: 0; }
    .ch-name { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ch-group { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .ch-play { width: 30px; height: 30px; border-radius: 8px; background: var(--accent)15; border: 1px solid var(--accent)30; color: var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .ch-play svg { width: 14px; height: 14px; fill: currentColor; }

    .list-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 32px; text-align: center; gap: 10px; }
    .list-empty .empty-icon { width: 56px; height: 56px; }
    .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 14px; color: var(--muted); }
    .loading-state .spinner { display: block; }
    .loading-state p { font-size: 12px; }

    /* ══════════════════════════════
       ADD VIEW
    ══════════════════════════════ */
    #view-add { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 16px 32px; }

    .add-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; padding: 20px 0 4px; }
    .add-sub { font-size: 11px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }

    .field { margin-bottom: 14px; }
    .field-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; display: block; }
    .field-input { width: 100%; background: var(--s1); border: 1px solid var(--border2); border-radius: 9px; padding: 12px 13px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; outline: none; -webkit-appearance: none; }
    .field-input::placeholder { color: var(--muted); font-size: 12px; }
    .field-input:focus { border-color: var(--accent)88; }

    .emoji-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 16px; }
    .emoji-opt { width: 38px; height: 38px; border-radius: 9px; background: var(--s2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: all 0.15s; }
    .emoji-opt.selected { background: var(--accent)20; border-color: var(--accent)66; transform: scale(1.08); }

    .btn-primary { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 10px; padding: 14px; color: #fff; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; -webkit-tap-highlight-color: transparent; }
    .btn-primary svg { width: 16px; height: 16px; fill: currentColor; }
    .btn-primary:active { opacity: 0.85; transform: scale(0.98); }

    .btn-secondary { width: 100%; background: var(--s1); border: 1px solid var(--border2); border-radius: 10px; padding: 13px; color: var(--muted); font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; -webkit-tap-highlight-color: transparent; }
    .btn-secondary svg { width: 15px; height: 15px; fill: currentColor; }
    .btn-secondary:active { background: var(--s2); }

    .add-note { font-size: 10px; color: var(--muted); text-align: center; margin-bottom: 20px; line-height: 1.5; }

    .divider { display: flex; align-items: center; gap: 10px; margin: 4px 0 16px; }
    .divider-line { flex: 1; height: 1px; background: var(--border2); }
    .divider-text { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

    /* ══════════════════════════════
       BOTTOM NAV — always visible
    ══════════════════════════════ */
    nav {
      flex-shrink: 0;
      display: flex;
      background: var(--s1);
      border-top: 1px solid var(--border);
      /* No extra padding — we already handled safe-area on .app */
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 12px 0 11px;
      cursor: pointer;
      color: var(--muted);
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item svg { width: 20px; height: 20px; fill: currentColor; }
    .nav-item span { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--s3); border: 1px solid var(--border2); color: var(--text); padding: 10px 18px; border-radius: 20px; font-size: 12px; z-index: 9999; opacity: 0; transition: all 0.25s; white-space: nowrap; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <span class="logo-name">StreamTV</span>
    </div>
    <div class="header-right">
      <div class="icon-btn" onclick="goFullscreen()">
        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- ── PLAYER ── -->
    <div class="view active" id="view-player">
      <div class="video-wrap">
        <video id="video" playsinline webkit-playsinline controls></video>
        <div class="video-overlay" id="overlay"><div class="spinner"></div></div>
      </div>

      <div class="player-body">
        <div id="playerInfo" style="display:none">
          <div class="player-info">
            <div class="now-label">Now Playing</div>
            <div class="now-name" id="nowName">—</div>
            <div class="live-row"><div class="live-pill"><div class="live-dot"></div>Live</div></div>
          </div>
          <div class="player-btns">
            <button class="p-btn" onclick="copyUrl()">
              <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
              <span>Copy URL</span>
            </button>
            <button class="p-btn" onclick="openVLC()">
              <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
              <span>VLC</span>
            </button>
            <button class="p-btn" onclick="reloadStream()">
              <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
              <span>Reload</span>
            </button>
            <button class="p-btn" onclick="goFullscreen()">
              <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
              <span>Fullscreen</span>
            </button>
          </div>
        </div>
        <div class="error-box" id="errorBox"></div>
        <div class="empty-player" id="emptyPlayer">
          <div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M21 3H3c-1.11 0-2 .89-2 2v12c0 1.1.89 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.11-.9-2-2-2zm0 14H3V5h18v12zm-5-6l-7 4V7z"/></svg></div>
          <div class="empty-title">Nothing playing</div>
          <div class="empty-sub">Pick a channel from the Channels tab</div>
        </div>
      </div>
    </div>

    <!-- ── CHANNELS ── -->
    <div class="view" id="view-channels">
      <div class="ch-sticky">
        <div class="ch-toolbar">
          <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input class="search-box" id="searchBox" type="search" placeholder="Search channels..." oninput="renderChannels()"/>
          </div>
          <span class="ch-count" id="chCount">0</span>
        </div>
        <div class="group-tabs" id="groupTabs"></div>
      </div>
      <div class="channel-list" id="channelList"></div>
    </div>

    <!-- ── ADD ── -->
    <div class="view" id="view-add">
      <div class="add-title">Add Channel</div>
      <div class="add-sub">Load the free Portuguese TV playlist, or add any stream URL manually.</div>

      <button class="btn-primary" onclick="loadM3UPT()">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        Load Portuguese TV Playlist
      </button>
      <button class="btn-secondary" onclick="clearAndReload()">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        Clear All &amp; Reload Fresh
      </button>
      <p class="add-note">Live TV, Rádio &amp; Webcams only — VOD and series filtered out automatically</p>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">Or add manually</span>
        <div class="divider-line"></div>
      </div>

      <div class="field">
        <label class="field-label">Channel Name</label>
        <input class="field-input" id="inName" type="text" placeholder="e.g. Sport TV 1" maxlength="40"/>
      </div>
      <div class="field">
        <label class="field-label">Stream URL (.m3u8)</label>
        <input class="field-input" id="inUrl" type="url" placeholder="https://example.com/stream.m3u8"/>
      </div>
      <div class="field">
        <label class="field-label">Icon</label>
        <div class="emoji-row" id="emojiRow">
          <div class="emoji-opt selected" data-emoji="⚽">⚽</div>
          <div class="emoji-opt" data-emoji="🏆">🏆</div>
          <div class="emoji-opt" data-emoji="📺">📺</div>
          <div class="emoji-opt" data-emoji="🎬">🎬</div>
          <div class="emoji-opt" data-emoji="🏀">🏀</div>
          <div class="emoji-opt" data-emoji="🎾">🎾</div>
          <div class="emoji-opt" data-emoji="🏊">🏊</div>
          <div class="emoji-opt" data-emoji="🥊">🥊</div>
        </div>
      </div>
      <button class="btn-primary" onclick="addManual()">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Save Channel
      </button>
    </div>

  </main>

  <!-- BOTTOM NAV -->
  <nav>
    <div class="nav-item active" id="nav-player" onclick="showView('player')">
      <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.11 0-2 .89-2 2v12c0 1.1.89 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.11-.9-2-2-2zm0 14H3V5h18v12zm-5-6l-7 4V7z"/></svg>
      <span>Player</span>
    </div>
    <div class="nav-item" id="nav-channels" onclick="showView('channels')">
      <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>
      <span>Channels</span>
    </div>
    <div class="nav-item" id="nav-add" onclick="showView('add')">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      <span>Add</span>
    </div>
  </nav>

</div>
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
const WORKER = 'https://streamproxy.esteves7771.workers.dev';
const M3UPT  = 'https://raw.githubusercontent.com/LITUATUI/M3UPT/main/M3U/M3UPT.m3u';

// ── STATE ──
let allChannels   = JSON.parse(localStorage.getItem('streamtv_v3') || '[]');
let filtered      = [];
let activeGroup   = 'All';
let currentCh     = null;
let hlsInstance   = null;
let selectedEmoji = '⚽';

// ── VIEWS ──
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'channels') renderChannels();
}

// ── SAVE ──
function save() { localStorage.setItem('streamtv_v3', JSON.stringify(allChannels)); }

// ── FILTER — strict whitelist ──
function isLive(ch) {
  const name  = (ch.name  || '').toLowerCase();
  const group = (ch.group || '').toLowerCase();

  const blocked = ['iegcqt','pcnelid','eixo do mal','o outro lado','100 ou mais','o planeta vivo','sem moderacao','sem moderação','debates'];
  if (blocked.some(b => name.includes(b) || group.includes(b))) return false;

  const allowed = ['tv','rádio','radio','webcam','beachcam','câmera','camera','desporto','sport','notícias','noticias','entretenimento','entertainment','música','musica','informação','informacao','custom'];
  if (!allowed.some(a => group.includes(a))) return false;

  // block episode/date patterns
  if (/s\d\de\d\d/i.test(name)) return false;
  if (/\b(ep\.?|episode|temporada|season)\s*\d/i.test(name)) return false;
  if (/20\d\d[-_.]\d\d[-_.]\d\d/.test(name)) return false;

  return true;
}

// ── PARSE M3U ──
function parseM3U(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const out = [];
  let cur = null;

  for (const line of lines) {
    if (line.startsWith('#EXTINF')) {
      cur = { name: '', url: '', group: 'TV', logo: '', referer: '', userAgent: '', origin: '', id: Math.random() };
      const nm = line.match(/,(.+)$/);   if (nm) cur.name  = nm[1].trim();
      const gr = line.match(/group-title="([^"]*)"/); if (gr) cur.group = gr[1] || 'TV';
      const lo = line.match(/tvg-logo="([^"]*)"/);    if (lo) cur.logo  = lo[1];
    } else if (line.startsWith('#EXTVLCOPT') && cur) {
      const ref = line.match(/http-referrer=(.+)/);  if (ref) cur.referer   = ref[1].trim();
      const ua  = line.match(/http-user-agent=(.+)/);if (ua)  cur.userAgent = ua[1].trim();
      const ori = line.match(/http-origin=(.+)/);    if (ori) cur.origin    = ori[1].trim();
    } else if (!line.startsWith('#') && line.startsWith('http') && cur) {
      cur.url = line;
      out.push(cur);
      cur = null;
    }
  }
  return out;
}

// ── LOAD M3UPT ──
async function loadM3UPT() {
  showView('channels');
  document.getElementById('channelList').innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Loading channels...</p></div>`;

  try {
    const res  = await fetch(WORKER + '/?url=' + encodeURIComponent(M3UPT));
    if (!res.ok) throw new Error('Fetch failed');
    const text = await res.text();
    const parsed  = parseM3U(text).filter(isLive);
    const existing = new Set(allChannels.map(c => c.url));
    let added = 0;
    for (const ch of parsed) {
      if (!existing.has(ch.url)) { allChannels.push(ch); added++; }
    }
    save();
    renderChannels();
    toast(`✅ ${added} channels added (${parsed.length - added} already saved)`);
  } catch (e) {
    document.getElementById('channelList').innerHTML = '';
    toast('Failed: ' + e.message);
  }
}

// ── CLEAR & RELOAD ──
async function clearAndReload() {
  if (!confirm('Clear all channels and reload fresh?')) return;
  allChannels = []; save(); currentCh = null;
  await loadM3UPT();
}

// ── RENDER CHANNELS ──
function renderChannels() {
  const q = (document.getElementById('searchBox').value || '').toLowerCase();

  const groups = ['All', ...new Set(allChannels.map(c => c.group))];
  document.getElementById('groupTabs').innerHTML = groups.map(g =>
    `<div class="gtab ${g === activeGroup ? 'active' : ''}" onclick="setGroup('${g.replace(/'/g,"\\'")}' )">${g}</div>`
  ).join('');

  filtered = allChannels.filter(ch => {
    const gOk = activeGroup === 'All' || ch.group === activeGroup;
    const sOk = !q || ch.name.toLowerCase().includes(q);
    return gOk && sOk;
  });

  document.getElementById('chCount').textContent = filtered.length;
  const list = document.getElementById('channelList');

  if (!allChannels.length) {
    list.innerHTML = `<div class="list-empty"><div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg></div><div class="empty-title">No channels yet</div><div class="empty-sub">Tap Add → Load Portuguese TV Playlist</div></div>`;
    return;
  }
  if (!filtered.length) {
    list.innerHTML = `<div class="list-empty"><div class="empty-title">No results</div><div class="empty-sub">Try a different search</div></div>`;
    return;
  }

  list.innerHTML = filtered.map((ch, i) => {
    const playing = currentCh && currentCh.url === ch.url;
    const logo = ch.logo
      ? `<img class="ch-logo" src="${ch.logo}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'"/><div class="ch-logo-fb" style="display:none">📺</div>`
      : `<div class="ch-logo-fb">${ch.emoji || '📺'}</div>`;
    return `<div class="channel-card ${playing ? 'playing' : ''}" onclick="playCh(${i})">
      ${logo}
      <div class="ch-info">
        <div class="ch-name">${esc(ch.name)}</div>
        <div class="ch-group">${esc(ch.group)}</div>
      </div>
      <div class="ch-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
    </div>`;
  }).join('');
}

function setGroup(g) { activeGroup = g; renderChannels(); }

// ── PLAY ──
function playCh(i) {
  const ch = filtered[i];
  currentCh = ch;
  showView('player');
  loadStream(ch, 0);
}

function loadStream(ch, attempt) {
  const video     = document.getElementById('video');
  const overlay   = document.getElementById('overlay');
  const info      = document.getElementById('playerInfo');
  const errBox    = document.getElementById('errorBox');
  const emptyEl   = document.getElementById('emptyPlayer');

  emptyEl.style.display  = 'none';
  info.style.display      = 'block';
  errBox.style.display    = 'none';
  document.getElementById('nowName').textContent = ch.name || '—';
  overlay.className = 'video-overlay loading';

  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  video.src = '';

  // Build Worker URL with referer/ua params
  const params = new URLSearchParams({ url: ch.url });
  if (ch.referer)   params.set('ref', ch.referer);
  if (ch.origin)    params.set('origin', ch.origin);
  if (ch.userAgent) params.set('ua', ch.userAgent);
  const workerUrl = WORKER + '/?' + params.toString();
  const directUrl = ch.url;
  const finalUrl  = attempt === 0 ? workerUrl : directUrl;

  console.log(attempt === 0 ? '▶ Worker:' : '▶ Direct:', finalUrl);

  const isHLS = ch.url.includes('.m3u8') || ch.url.includes('m3u8');

  // iOS Safari — native HLS
  if (!Hls.isSupported() && video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = finalUrl;
    video.addEventListener('canplay', () => { overlay.className = 'video-overlay'; video.play().catch(()=>{}); }, { once: true });
    video.addEventListener('error', () => {
      if (attempt === 0) loadStream(ch, 1);
      else { overlay.className = 'video-overlay'; showErr('Cannot play. Try the VLC button.'); }
    }, { once: true });
    return;
  }

  if (isHLS && Hls.isSupported()) {
    hlsInstance = new Hls({
      enableWorker: true, lowLatencyMode: true, maxBufferLength: 30,
      xhrSetup: xhr => { xhr.withCredentials = false; }
    });
    hlsInstance.loadSource(finalUrl);
    hlsInstance.attachMedia(video);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
      overlay.className = 'video-overlay';
      video.play().catch(()=>{});
    });
    hlsInstance.on(Hls.Events.ERROR, (e, d) => {
      if (d.fatal) {
        hlsInstance.destroy(); hlsInstance = null;
        if (attempt === 0) loadStream(ch, 1);
        else { overlay.className = 'video-overlay'; showErr('Stream failed. URL may have expired.<br>Try <strong>VLC</strong> button.'); }
      }
    });
  } else {
    video.src = finalUrl;
    video.addEventListener('canplay', () => { overlay.className = 'video-overlay'; }, { once: true });
    video.play().catch(()=>{});
  }
}

function showErr(msg) {
  const b = document.getElementById('errorBox');
  b.innerHTML = '⚠️ ' + msg; b.style.display = 'block';
}

function reloadStream() { if (currentCh) loadStream(currentCh, 0); }

// ── ADD MANUAL ──
function addManual() {
  const name = document.getElementById('inName').value.trim();
  const url  = document.getElementById('inUrl').value.trim();
  if (!name) { toast('Enter a name'); return; }
  if (!url || !url.startsWith('http')) { toast('Enter a valid URL'); return; }
  allChannels.unshift({ id: Math.random(), name, url, group: 'Custom', logo: '', emoji: selectedEmoji, referer: '', userAgent: '', origin: '' });
  save();
  document.getElementById('inName').value = '';
  document.getElementById('inUrl').value  = '';
  toast('Channel saved!');
  setTimeout(() => showView('channels'), 500);
}

// ── UTILS ──
function copyUrl() {
  if (!currentCh) return;
  navigator.clipboard?.writeText(currentCh.url).then(() => toast('URL copied!')).catch(() => {
    const t = document.createElement('textarea'); t.value = currentCh.url;
    document.body.appendChild(t); t.select(); document.execCommand('copy');
    document.body.removeChild(t); toast('Copied!');
  });
}
function openVLC() {
  if (!currentCh) return;
  window.location.href = 'vlc://' + currentCh.url.replace(/^https?:\/\//,'');
  toast('Opening VLC...');
}
function goFullscreen() {
  const v = document.getElementById('video');
  (v.requestFullscreen || v.webkitEnterFullscreen || v.webkitRequestFullscreen || (()=>{})).call(v);
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── EMOJI ──
document.getElementById('emojiRow').addEventListener('click', e => {
  const o = e.target.closest('.emoji-opt'); if (!o) return;
  document.querySelectorAll('.emoji-opt').forEach(x => x.classList.remove('selected'));
  o.classList.add('selected'); selectedEmoji = o.dataset.emoji;
});

// ── PWA ──
if ('serviceWorker' in navigator) {
  const sw = `self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',()=>{});`;
  const url = URL.createObjectURL(new Blob([sw], { type: 'application/javascript' }));
  navigator.serviceWorker.register(url).catch(()=>{});
}

// ── INIT ──
// Purge old non-live channels from cache
const before = allChannels.length;
allChannels = allChannels.filter(isLive);
if (allChannels.length !== before) save();

renderChannels();
</script>
</body>
</html>
